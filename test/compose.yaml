name: wp-crossfire-test

# WordPress versions under test + one shared MariaDB.
# Ports: wp59=8059  wp60=8060  wp64=8064  wp66=8066  latest=8080
#
# Quickstart:
#   podman compose up -d
#   ./setup.sh        # install WP core + plugins in each container
#   ./dump-all.sh     # export inventory to dumps/

services:

  # ── database ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
    volumes:
      - db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── WordPress 5.9 ─────────────────────────────────────────────────────────
  wp59:
    image: wordpress:5.9
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wp59
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "8059:80"
    volumes:
      - wp59:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WordPress 6.0 ─────────────────────────────────────────────────────────
  wp60:
    image: wordpress:6.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wp60
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "8060:80"
    volumes:
      - wp60:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WordPress 6.4 ─────────────────────────────────────────────────────────
  wp64:
    image: wordpress:6.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wp64
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "8064:80"
    volumes:
      - wp64:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WordPress 6.6 ─────────────────────────────────────────────────────────
  wp66:
    image: wordpress:6.6
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wp66
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "8066:80"
    volumes:
      - wp66:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WordPress latest ──────────────────────────────────────────────────────
  wplatest:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wplatest
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "8080:80"
    volumes:
      - wplatest:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  wp59:
  wp60:
  wp64:
  wp66:
  wplatest:
