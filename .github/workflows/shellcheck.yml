name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck wp-dump.sh
          shellcheck wp-vulns.sh
          shellcheck test/setup.sh
          shellcheck test/dump-all.sh
